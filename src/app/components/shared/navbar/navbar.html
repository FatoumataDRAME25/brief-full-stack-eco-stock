<!-- Navbar -->
<div class="flex items-center justify-between px-6 py-3 bg-white border-b border-gray-100">

  <!-- Barre de recherche -->
  <div class="relative w-72">
    <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
    <input
      type="text"
      [(ngModel)]="searchTerm"
      placeholder="Rechercher un produit, un entrepôt..."
      class="w-full pl-9 pr-4 py-2 text-sm text-gray-700 bg-gray-50 border border-gray-200 rounded-lg placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
    />

      <div class="absolute top-full left-0 mt-1 w-96 bg-white border border-gray-200 rounded-lg shadow-lg z-50 max-h-96 overflow-y-auto">

        <!-- Rechercher un entrepot -->
        @if (matchingWarehouses().length > 0) {
          <p class="px-4 pt-3 pb-1 text-xs font-semibold text-gray-400 uppercase tracking-wide">Entrepôts</p>
          @for (warehouse of matchingWarehouses(); track warehouse.id) {

            <a  [routerLink]="['/warehouses', warehouse.id, 'audit']"
              (click)="searchTerm = ''"
              class="flex items-center gap-2 px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 transition"
            >
              <i class="fa-solid fa-warehouse text-gray-400 text-xs"></i>
              {{ warehouse.nom }}
            </a>
          }
        }

      </div>

  </div>

  <!-- Profil utilisateur -->
  <div class="flex items-center gap-3">
    <div class="text-right">
      <p class="text-sm font-semibold text-gray-800">{{username}}</p>
    </div>

  </div>

</div>
