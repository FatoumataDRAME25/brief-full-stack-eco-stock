

<!-- Overlay modale -->
<div class="fixed inset-0 bg-gray-400/50 flex items-center justify-center z-50 px-4">

  <!-- Modale -->
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg p-8">

    <!-- En-tête -->
    <div class="flex items-start justify-between mb-6">
      <div class="flex items-center gap-3">
        <div class="bg-blue-50 rounded-xl p-2.5">
          <i class="fa-solid fa-warehouse text-blue-600 text-lg"></i>
        </div>
        <div>
          <h2 class="text-lg font-semibold text-gray-800">Ajouter un entrepôt</h2>
          <p class="text-sm text-gray-400">Saisissez les informations de votre nouvelle unité.</p>
        </div>
      </div>
      <button class="text-gray-400 hover:text-gray-600 transition" aria-label="Fermer" (click)="fermer.emit()">
        <i class="fa-solid fa-xmark text-lg"></i>
      </button>
    </div>

    <!-- Formulaire -->
    <form  class="space-y-5" [formGroup]="form" (ngSubmit)="onSubmit()">

      <!-- Nom de l'entrepôt -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Nom de l'entrepôt
        </label>
        <input
          formControlName = "nom"
          type="text"
          placeholder="Entrepôt Principal Lyon"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
        />
        <p class="text-xs text-gray-400 mt-1">Identifiant unique pour votre réseau de distribution.</p>
      </div>

      <!-- Localisation -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Localisation
        </label>
        <div class="relative">
          <i class="fa-solid fa-location-dot absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
          <input
            formControlName = "localisation"
            type="text"
            placeholder="69007 Lyon, France"
            class="w-full border border-gray-300 rounded-lg pl-9 pr-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
          />
        </div>
      </div>

      <!-- Capacité maximale -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Capacité maximale
        </label>
        <input
          formControlName = "capacite"
          type="number"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
        />
        <p class="text-xs text-gray-400 mt-1">La capacité totale permet d'optimiser le taux d'occupation.</p>
      </div>

      <!-- Actions -->
      <div class="flex items-center justify-end gap-3 pt-2">
        <button
          type="button"
          class="px-5 py-2.5 text-sm font-medium text-gray-700 bg-white border border-gray-200 rounded-lg hover:bg-gray-50 transition"
        (click)="fermer.emit()">
          Annuler
        </button>
        <button
          type="submit"
          class="flex items-center gap-2 px-5 py-2.5 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition"
        >
          <i class="fa-solid fa-plus"></i>
          Enregistrer
        </button>
      </div>

    </form>

  </div>

</div>
