<!-- Overlay modale -->
<div class="fixed inset-0 bg-gray-400/50 flex items-center justify-center z-50 px-4">

  <!-- Modale -->
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg p-8">

    <!-- En-tête -->
    <div class="flex items-start justify-between mb-6">
      <div class="flex items-center gap-3">
        <div class="bg-blue-50 rounded-xl p-2.5">
          <i class="fa-solid fa-box text-blue-600 text-lg"></i>
        </div>
        <div>
          <h2 class="text-lg font-semibold text-gray-800">Ajouter un produit</h2>
          <p class="text-sm text-gray-400">Saisissez les informations de votre nouvel article alimentaire.</p>
        </div>
      </div>
      <button class="text-gray-400 hover:text-gray-600 transition" aria-label="Fermer" (click)="fermer.emit()">
        <i class="fa-solid fa-xmark text-lg"></i>
      </button>
    </div>

    <!-- Formulaire -->
    <form class="space-y-5">

      <!-- Nom du produit -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Nom du produit
        </label>
        <input
          type="text"
          placeholder="ex: Pommes Gala Bio"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
        />
        <p class="text-xs text-gray-400 mt-1">Le nom complet de l'article pour faciliter la recherche.</p>
      </div>

      <!-- Quantité -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Quantité
        </label>
        <input
          type="number"
          placeholder="0"
          class="w-full border border-red-300 rounded-lg px-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent transition"
        />
        <!-- Message d'erreur -->
        <p class="text-xs text-red-500 mt-1 flex items-center gap-1">
          <i class="fa-solid fa-circle-exclamation"></i>
          La quantité est obligatoire.
        </p>
      </div>

      <!-- Entrepôt de stockage -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Entrepôt de stockage
        </label>
        <select
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm text-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition appearance-none bg-white"
        >
          <option value="" disabled selected>Sélectionner un entrepôt...</option>
          <option value="1">Paris-Est B4</option>
          <option value="2">Lyon-Nord A1</option>
          <option value="3">Marseille-Sud C2</option>
          <option value="4">Nantes-Ouest D3</option>
        </select>
      </div>

      <!-- Date d'expiration + État initial -->
      <div class="grid grid-cols-2 gap-4">

        <!-- Date d'expiration -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Date d'expiration
          </label>
          <div class="relative">
            <input
              type="text"
              placeholder="DD/MM/YYYY"
              class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition pr-10"
            />
            <i class="fa-regular fa-calendar absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
          </div>
        </div>

        <!-- État initial -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1 flex items-center gap-1">
            <i class="fa-solid fa-tag text-blue-500 text-xs"></i>
            État initial
          </label>
          <div class="relative">
            <select
              class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition appearance-none bg-white"
            >
              <option value="disponible" class="text-green-600" selected>Disponible</option>
              <option value="reserve">Réservé</option>
              <option value="perime">Périmé</option>
            </select>
            <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none"></i>
          </div>
        </div>

      </div>

      

      <!-- Actions -->
      <div class="flex items-center justify-end gap-3 pt-2">
        <button
          type="button" (click)="fermer.emit()"
          class="px-5 py-2.5 text-sm font-medium text-gray-700 bg-white border border-gray-200 rounded-lg hover:bg-gray-50 transition"
        >
          Annuler
        </button>
        <button
          type="submit"
          class="flex items-center gap-2 px-5 py-2.5 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition"
        >
          <i class="fa-solid fa-plus"></i>
          Enregistrer
        </button>
      </div>

    </form>

  </div>

</div>
